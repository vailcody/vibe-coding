<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вайб-кодинг — Колвир</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff3300; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-family: 'Archivo', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: #555; font-size: 1.2rem; margin-bottom: 3rem; }
        .lessons { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
        .lesson-card {
            border: 2px solid #000;
            padding: 2rem 3rem;
            text-decoration: none;
            color: #000;
            transition: border-color 0.2s, transform 0.2s;
            min-width: 280px;
        }
        .lesson-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }
        .lesson-card h2 {
            font-family: 'Archivo', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .lesson-card p { color: #555; font-size: 0.95rem; }
        .lesson-card .hours {
            font-family: 'Archivo', sans-serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>Вайб-кодинг</h1>
    <p class="subtitle">Константин Чуйков &middot; Колвир 2026</p>
    <div class="lessons">
        <a href="lesson-1/" class="lesson-card">
            <h2>Занятие 1</h2>
            <p>Создаём прототип</p>
            <div class="hours">1 час &middot; 19 марта</div>
        </a>
        <a href="lesson-2/" class="lesson-card">
            <h2>Занятие 2</h2>
            <p>Оживляем прототип в Cursor</p>
            <div class="hours">2 часа &middot; 24 марта</div>
        </a>
        <a href="lesson-3/" class="lesson-card">
            <h2>Занятие 3</h2>
            <p>SDD + Свой MCP-сервер</p>
            <div class="hours">2 часа &middot; 26 марта</div>
        </a>
    </div>
</body>
</html>
