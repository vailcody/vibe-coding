name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-app/package-lock.json
      - run: npm ci
        working-directory: react-app
      - run: npm run build
        working-directory: react-app
      # Copy static HTML presentations into the build output
      - run: |
          cp -r lesson-1 react-app/dist/
          cp -r lesson-2 react-app/dist/
          cp -r lesson-3 react-app/dist/
          cp -r lecture-central-university react-app/dist/
          cp -r pdf react-app/dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: react-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
