<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all paths to index.html with the path as a query param
    var path = window.location.pathname;
    // Only redirect React app routes, not static HTML presentations
    var staticPaths = ['/vibe-coding/lesson-1/', '/vibe-coding/lesson-2/', '/vibe-coding/lesson-3/', '/vibe-coding/lecture-central-university/', '/vibe-coding/pdf/'];
    var isStatic = staticPaths.some(function(p) { return path.startsWith(p); });
    if (!isStatic) {
      window.location.replace('/vibe-coding/?redirect=' + encodeURIComponent(path));
    }
  </script>
</head>
<body></body>
</html>
